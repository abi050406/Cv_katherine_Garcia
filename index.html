<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Interactivo - Katherine García</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('experiencia');

            const profile = {
                name: "KATHERINE ABIGAIL GARCÍA MONTANO",
                role: "Ingeniera en Computación en Formación | Backend Developer",
                location: "Managua, Nicaragua",
                phone: "505 8362-9590",
                email: "katherinegarciaam05@gmail.com",
                bio: "Estudiante de quinto año de Ingeniería en Computación con un perfil técnico orientado al desarrollo backend y administración de infraestructura de TI. Especializada en la construcción de sistemas robustos utilizando PHP, Java y C#, con sólida experiencia en la gestión de bases de datos relacionales como PostgreSQL y SQL Server. Poseo conocimientos prácticos en la contenedorización de aplicaciones con Docker, administración de redes avanzadas (Omada) y gestión de flujos de trabajo certificados por Asana."
            };

            const skills = [
                { name: "Programación", items: ["Java", "PHP", "C#", "Python"], icon: "code-2", color: "bg-blue-600" },
                { name: "Backend & Datos", items: ["PostgreSQL", "SQL Server", "REST APIs"], icon: "database", color: "bg-emerald-600" },
                { name: "Infraestructura", items: ["Omada TP-Link", "Soporte Técnico", "Redes"], icon: "network", color: "bg-indigo-600" },
                { name: "Gestión & DevOps", items: ["Asana Certified", "Docker", "Git/GitHub"], icon: "box", color: "bg-orange-600" }
            ];

            const certifications = [
                { name: "Asana Administrator", provider: "Asana Academy", date: "Marzo 2026", expiry: "Marzo 2028" },
                { name: "Workflow Specialist", provider: "Asana Academy", date: "Marzo 2026", expiry: "Marzo 2027" }
            ];

            const experience = [
                { company: "Voov", role: "Soporte Técnico / TI", period: "2025 – 2026", desc: "Resolución de incidencias hardware/software y administración de redes Omada." },
                { company: "UNHSJM", role: "Pasante en Administración de Redes", period: "2024", desc: "Mantenimiento de infraestructura de red institucional y diagnóstico técnico." }
            ];

            const education = [
                { institution: "UNHSJM", degree: "Ingeniería en Computación", status: "5to Año (2022 – 2026)" },
                { institution: "Col. Jamie Torres Bodet", degree: "Bachiller en Ciencias y Letras", status: "2021" }
            ];

            return (
                <div className="min-h-screen">
                    <button onClick={() => window.print()} className="no-print fixed bottom-8 right-8 z-50 bg-blue-600 text-white p-4 rounded-full shadow-2xl hover:bg-blue-700 transition-all flex items-center gap-2 group">
                        <Icon name="printer" className="w-5 h-5" />
                        <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 font-bold whitespace-nowrap">PDF / Imprimir</span>
                    </button>

                    <header className="pt-16 pb-32 px-6 bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-950 text-white print:bg-white print:text-black print:pb-8">
                        <div className="max-w-4xl mx-auto text-center print:text-left">
                            <h1 className="text-4xl md:text-6xl font-black mb-6 uppercase print:text-3xl">{profile.name}</h1>
                            <p className="text-xl md:text-2xl text-blue-200 mb-8 border-b border-blue-500/30 pb-8 print:text-slate-700 print:text-lg">{profile.role}</p>
                            <div className="flex flex-wrap justify-center gap-6 text-sm print:justify-start print:text-slate-600">
                                <span className="flex items-center gap-2"><Icon name="map-pin" className="w-4 h-4 text-blue-400" /> {profile.location}</span>
                                <span className="flex items-center gap-2"><Icon name="mail" className="w-4 h-4 text-blue-400" /> {profile.email}</span>
                                <span className="flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-blue-400" /> {profile.phone}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 -mt-20 pb-20 print:mt-0">
                        <section className="bg-white rounded-3xl shadow-2xl p-8 mb-12 border border-slate-100 print:shadow-none print:p-0 print:mb-8">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-3 text-slate-800 print:text-xl">
                                <Icon name="cpu" className="w-6 h-6 text-blue-600 no-print" /> Perfil Profesional
                            </h2>
                            <p className="text-slate-600 leading-relaxed text-lg italic border-l-4 border-blue-600 pl-6 print:text-base">"{profile.bio}"</p>
                        </section>

                        <section className="mb-12 print:mb-8">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-3 text-slate-800 print:text-xl">
                                <Icon name="award" className="w-6 h-6 text-amber-600 no-print" /> Certificaciones Asana
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {certifications.map((cert, i) => (
                                    <div key={i} className="flex items-center gap-4 bg-white p-5 rounded-2xl border border-slate-100 shadow-sm print:p-3">
                                        <Icon name="check-circle-2" className="w-6 h-6 text-amber-600" />
                                        <div>
                                            <h3 className="font-bold text-slate-800 text-sm">{cert.name}</h3>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase">Vence: {cert.expiry}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="mb-12">
                            <h2 className="text-2xl font-bold mb-8 flex items-center gap-3 text-slate-800 print:text-xl">
                                <Icon name="server" className="w-6 h-6 text-emerald-600 no-print" /> Tech Stack
                            </h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {skills.map((skill, i) => (
                                    <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 print:p-2">
                                        <h3 className="font-bold text-slate-900 mb-2 text-xs flex items-center gap-2">
                                            <Icon name={skill.icon} className="w-4 h-4 no-print" /> {skill.name}
                                        </h3>
                                        <div className="flex flex-wrap gap-1">
                                            {skill.items.map((item, idx) => (
                                                <span key={idx} className="text-[9px] font-bold px-2 py-0.5 bg-slate-50 rounded border border-slate-200">{item}</span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <div className="grid md:grid-cols-3 gap-8">
                            <div className="md:col-span-2">
                                <div className="flex border-b mb-6 no-print">
                                    <button onClick={() => setActiveTab('experiencia')} className={`py-3 px-6 text-xs font-bold uppercase ${activeTab === 'experiencia' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'}`}>Experiencia</button>
                                    <button onClick={() => setActiveTab('educacion')} className={`py-3 px-6 text-xs font-bold uppercase ${activeTab === 'educacion' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'}`}>Educación</button>
                                </div>
                                <div className="space-y-6">
                                    {(activeTab === 'experiencia' ? experience : education).map((item, i) => (
                                        <div key={i} className="relative pl-8 border-l-2 border-slate-200 pb-2">
                                            <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-blue-600 border-4 border-white no-print"></div>
                                            <h3 className="font-black text-lg text-slate-900">{item.role || item.degree}</h3>
                                            <p className="text-blue-600 font-bold text-xs uppercase">{item.company || item.institution} | {item.period || item.status}</p>
                                            <p className="text-slate-600 text-sm mt-2">{item.desc || item.detail}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="print:hidden">
                                <h2 className="text-xl font-bold mb-6 text-slate-800">{activeTab === 'experiencia' ? 'Educación' : 'Experiencia'}</h2>
                                <div className="space-y-4">
                                    {(activeTab === 'experiencia' ? education : experience).map((item, i) => (
                                        <div key={i} className="bg-white p-4 rounded-xl border border-slate-100">
                                            <h3 className="font-bold text-slate-900 text-xs">{item.degree || item.role}</h3>
                                            <p className="text-blue-600 text-[10px] font-bold">{item.institution || item.company}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                    <footer className="mt-20 py-10 text-center text-slate-400 text-xs no-print bg-slate-900">
                        &copy; 2025 Katherine Abigail García Montano
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
